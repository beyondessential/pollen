name: CD

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  build-binary:
    name: Build arm64 binary
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Configure toolchain
        run: |
          rustup toolchain install --profile minimal --no-self-update stable
          rustup default stable
          rustup target add aarch64-unknown-linux-gnu
      - uses: taiki-e/install-action@v2.81.7
        with:
          tool: just
      - uses: Swatinem/rust-cache@v2
        with:
          key: arm64-release
      # The runner ships Node + npm; build.rs uses them to produce the embedded
      # web/dist/ bundle (build-release re-enables the frontend build).
      - name: Build binary
        run: just build-release aarch64-unknown-linux-gnu
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/arm64
          cp target/aarch64-unknown-linux-gnu/release/pollen-server artifacts/arm64/
      - uses: actions/upload-artifact@v7
        with:
          name: binaries-arm64
          path: artifacts/arm64/
          retention-days: 1

  build-image:
    name: Build container image
    runs-on: ubuntu-24.04
    needs: [build-binary]
    steps:
      - name: Login to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin
      - uses: actions/checkout@v6.0.3
      - id: tag
        run: echo "value=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Download arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: binaries-arm64
          path: .github/build-context/arm64/
      - name: Setup buildkit
        uses: docker/setup-buildx-action@v4
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/beyondessential/pollen
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.tag.outputs.value }}
          labels: |
            org.opencontainers.image.vendor=BES
            org.opencontainers.image.title=Pollen
            org.opencontainers.image.source=https://github.com/beyondessential/pollen/
            org.opencontainers.image.licenses=GPL-3.0-or-later
      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .github/build-context
          file: .github/Containerfile
          platforms: linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}

  # Deployment (K8s workload, public hostname, Envoy ingress, CNPG database) is
  # an ops/Pulumi change in the ops repo, pinned to the image tag built above.
  # Wire a deploy job here once that stack exists.
